services:
  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_BACKEND_URL=http://backend:8000
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - FAL_KEY=${FAL_KEY}
      - MCP_SERVER_URL=http://mcp-server:8001
    depends_on:
      - mcp-server
    volumes:
      - ./mcp-server/storage:/app/storage

  mcp-server:
    build: ./mcp-server
    ports:
      - "8001:8001"
    volumes:
      - ./mcp-server/storage:/app/storage
